; Qwen3-Coder-Next (UD-Q8_K_XL - 86GB)
; 80B MoE model, 3B active params, non-thinking mode.
; Agentic coding: long-horizon reasoning, tool usage, failure recovery.
; Recommended sampling: temperature=1.0, top_p=0.95, top_k=40

version = 1

[qwen3-coder-next]
model = /path/to/models/qwen3-coder-next/Qwen3-Coder-Next-UD-Q8_K_XL-00001-of-00003.gguf
c = 262144
b = 512
ub = 128
t = -1
ngl = 999
flash-attn = on
jinja = true
no-mmap = true
cache-type-k = q8_0
cache-type-v = q8_0
cache-reuse = 4096
kv-unified = true
spec-type = ngram-mod
spec-ngram-size-n = 10
draft-min = 12
draft-max = 24
load-on-startup = true
