; whisper.cpp STT preset — runs via whisper-server.
;
; Usage:
;   whisper-server whisper --port 8081
;   ./scripts/download-whisper-model.sh small

version = 1

[stt-default]
; Model name or absolute path.
; If a bare name (e.g. small), resolves to ~/models/whisper/ggml-small.bin
; Download: ./scripts/download-whisper-model.sh small
; Sizes: tiny(39MB), base(74MB), small(466MB), medium(1.5GB), large-v3-turbo(1.6GB)
model = small

; Language hint (ISO 639-1 code, empty = auto-detect)
language = de

; Number of CPU threads
threads = 4

; Server port
port = 8081

; Host address
host = 0.0.0.0

; Voice Activity Detection (enabled by default)
vad = false

; Temperature for decoding (0.0 = greedy)
temperature = 0.0

; Temperature increment for fallback
temperature-inc = 0.2

; Maximum segment length (in seconds)
max-segment-ms = 30000

; No-timestamps mode (faster)
no-timestamps = true
